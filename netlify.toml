[build]
  command = "bun install && bun run build"
  publish = "dist"
  environment = { NODE_VERSION = "20" }

[dev]
  command = "bun run dev"
  port = 5173
  framework = "vite"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

[images]
  remote_images = ["https://ext.same-assets.com/*"]

[[headers]]
  for = "/*"
    [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
